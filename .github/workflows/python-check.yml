name: Python Code Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyspark

      - name: Validate Python syntax
        run: |
          python -m py_compile notebooks/01_bronze_ingestion.py
          python -m py_compile notebooks/02_silver_transformation.py
          python -m py_compile notebooks/03_gold_aggregation.py
          python -m py_compile notebooks/04_data_quality_checks.py
